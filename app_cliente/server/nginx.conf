server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Configurações de segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Healthcheck
    location = /health {
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # Arquivos críticos - sem cache
    location ~* ^/(index\.html|main\.dart\.js|flutter\.js|flutter_service_worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Assets estáticos - cache longo
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|json|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss;
    gzip_min_length 1000;
}