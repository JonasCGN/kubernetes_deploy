<!DOCTYPE html> 
<html> 
<head>   
  <!--     
    If you are serving your web app in a path other than the root, change the     
    href value below to reflect the base path you are serving from.      
    
    The path provided below has to start and end with a slash "/" in order for

    This is a placeholder for base href that will be replaced by the value of     
    the `--base-href` argument provided to `flutter build`.   
  -->

  <script>
    // Tratamento de deep link para PKCE
    if (window.location.hash.includes('access_token')) {
      window.location.href = window.location.origin + window.location.hash;
    }
  </script>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Brazza Burger - Faça seus pedidos de retirada ou delivery de forma rápida e prática.">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Brazza Burger">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Brazza Burger - Cliente</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading Screen Styles -->
  <style>
    #loading_screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }

    #loading_screen.hide {
      opacity: 0;
      pointer-events: none;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .loading-container {
      text-align: center;
      position: relative;
      z-index: 10;
      font-family: 'Arial Black', 'Arial', sans-serif;
    }

    .logo-container {
      position: relative;
      margin-bottom: 40px;
      animation: logoFloat 3s ease-in-out infinite;
    }

    .logo {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #2d2d2d;
      border: 6px solid #333;
      position: relative;
      margin: 0 auto;
      box-shadow: 
        0 0 30px rgba(255, 165, 0, 0.3),
        inset 0 0 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .logo::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      background: conic-gradient(from 0deg, #ff8c00, #ffa500, #ff8c00);
      border-radius: 50%;
      z-index: -1;
      animation: rotate 4s linear infinite;
    }

    .brand-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
    }

    .bra-text {
      font-size: 48px;
      font-weight: 900;
      color: #ff8c00;
      text-shadow: 
        3px 3px 0px #000,
        -1px -1px 0px #000,  
        1px -1px 0px #000,
        -1px 1px 0px #000,
        1px 1px 0px #000;
      letter-spacing: -2px;
      margin-bottom: -8px;
      animation: slideInLeft 2s ease-out 0.5s both;
      position: relative;
    }

    .burger-icon {
      position: absolute;
      right: -10px;
      top: -5px;
      width: 35px;
      height: 25px;
      animation: bounceIn 2s ease-out 1s both;
    }

    .crown {
      position: absolute;
      top: -8px;
      right: -5px;
      color: #fff;
      font-size: 12px;
      text-shadow: 1px 1px 2px #000;
      animation: crownFloat 2s ease-in-out infinite 1.5s;
    }

    .burger-top {
      width: 35px;
      height: 10px;
      background: linear-gradient(145deg, #ff8c00, #e6750a);
      border-radius: 15px 15px 5px 5px;
      position: relative;
      margin-bottom: 1px;
    }

    .burger-top::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 5px;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 4px 0 0 #fff, 8px 1px 0 #fff, 12px -1px 0 #fff, 16px 0 0 #fff, 20px 1px 0 #fff;
    }

    .burger-filling {
      width: 32px;
      height: 3px;
      background: #4CAF50;
      margin: 1px auto;
      border-radius: 1px;
    }

    .burger-filling:nth-child(2) {
      background: #e74c3c;
      width: 30px;
    }

    .burger-filling:nth-child(3) {
      background: #8B4513;
      width: 33px;
      height: 4px;
    }

    .burger-bottom {
      width: 35px;
      height: 8px;
      background: linear-gradient(145deg, #ff8c00, #e6750a);
      border-radius: 5px 5px 15px 15px;
      margin-top: 1px;
    }

    .zza-text {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      text-shadow: 
        4px 4px 0px #000,
        -2px -2px 0px #000,  
        2px -2px 0px #000,
        -2px 2px 0px #000,
        2px 2px 0px #000;
      letter-spacing: -3px;
      margin-bottom: -5px;
      animation: slideInRight 2s ease-out 0.8s both;
      position: relative;
    }

    .fire-icon {
      position: absolute;
      right: -5px;
      top: 10px;
      font-size: 16px;
      animation: fireFlicker 1.5s ease-in-out infinite 2s;
    }

    .burger-script {
      font-size: 24px;
      color: #ff8c00;
      font-style: italic;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      margin-top: 5px;
      animation: fadeInUp 2s ease-out 1.5s both;
    }

    .loading-text {
      color: #ecf0f1;
      font-size: 16px;
      margin-top: 30px;
      animation: pulse 2s ease-in-out infinite;
      font-weight: normal;
    }

    .progress-bar {
      width: 280px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin: 25px auto;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 140, 0, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff8c00, #ffa500, #ff8c00);
      border-radius: 4px;
      width: 0%;
      animation: loadProgress 4s ease-in-out infinite;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .floating-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .floating-element {
      position: absolute;
      opacity: 0.1;
      animation: float 6s ease-in-out infinite;
      font-size: 24px;
    }

    .floating-element:nth-child(1) {
      top: 15%;
      left: 10%;
      animation-delay: 0s;
    }

    .floating-element:nth-child(2) {
      top: 25%;
      right: 15%;
      animation-delay: 1.5s;
      font-size: 32px;
    }

    .floating-element:nth-child(3) {
      bottom: 35%;
      left: 20%;
      animation-delay: 3s;
      font-size: 28px;
    }

    .floating-element:nth-child(4) {
      bottom: 20%;
      right: 25%;
      animation-delay: 4.5s;
      font-size: 36px;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideInLeft {
      0% { transform: translateX(-100px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInRight {
      0% { transform: translateX(100px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3) rotate(-45deg); opacity: 0; }
      50% { transform: scale(1.1) rotate(5deg); }
      70% { transform: scale(0.95) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes crownFloat {
      0%, 100% { transform: translateY(0px) rotate(-5deg); }
      50% { transform: translateY(-3px) rotate(5deg); }
    }

    @keyframes fireFlicker {
      0%, 100% { opacity: 1; transform: scale(1); }
      25% { opacity: 0.8; transform: scale(1.1); }
      50% { opacity: 1; transform: scale(0.9); }
      75% { opacity: 0.9; transform: scale(1.05); }
    }

    @keyframes fadeInUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes loadProgress {
      0% { width: 0%; }
      50% { width: 75%; }
      100% { width: 100%; }
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.1; }
      50% { transform: translateY(-25px) rotate(180deg); opacity: 0.3; }
    }

    @media (max-width: 768px) {
      .logo {
        width: 180px;
        height: 180px;
      }
      
      .brand-content {
        width: 150px;
        height: 150px;
      }
      
      .bra-text {
        font-size: 38px;
      }
      
      .zza-text {
        font-size: 58px;
      }
      
      .burger-script {
        font-size: 20px;
      }
      
      .progress-bar {
        width: 240px;
      }
    }
  </style>
</head> 
<body>
  <!-- Loading Screen -->
  <div id="loading_screen">
    <div class="floating-elements">
      <div class="floating-element">🍔</div>
      <div class="floating-element">🍟</div>
      <div class="floating-element">🥤</div>
      <div class="floating-element">🔥</div>
    </div>

    <div class="loading-container">
      <div class="logo-container">
        <div class="logo">
          <div class="brand-content">
            <div class="bra-text">
              
              <div class="burger-icon">
                <div class="crown">👑</div>
                <div class="burger-top"></div>
                <div class="burger-filling"></div>
                <div class="burger-filling"></div>
                <div class="burger-filling"></div>
                <div class="burger-bottom"></div>
              </div>
            </div>
            <div class="zza-text">
              ZZA
              <div class="fire-icon">🔥</div>
            </div>
            <div class="burger-script">Burger</div>
          </div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div class="loading-text">Preparando o melhor burger para você...</div>
    </div>
  </div>

  <!-- Flutter App Container -->
  <div id="flutter-app" style="display: none;">
    <script src="flutter_bootstrap.js" async></script>
  </div>

  <script>
    // Loading Screen Logic
    const loadingMessages = [
      "Preparando o melhor burger para você...",
      "Aquecendo a chapa na temperatura ideal...",
      "Selecionando os ingredientes mais frescos...",
      "Grelhando a carne no ponto perfeito...",
      "Montando seu Brazza Burger...",
      "Adicionando os toques finais...",
      "Quase pronto! Só mais um instantinho..."
    ];

    let messageIndex = 0;
    const loadingTextElement = document.querySelector('.loading-text');
    const loadingScreen = document.getElementById('loading_screen');
    const flutterApp = document.getElementById('flutter-app');

    // Função para alternar mensagens
    function changeLoadingMessage() {
      messageIndex = (messageIndex + 1) % loadingMessages.length;
      if (loadingTextElement) {
        loadingTextElement.style.opacity = '0';
        
        setTimeout(() => {
          loadingTextElement.textContent = loadingMessages[messageIndex];
          loadingTextElement.style.opacity = '1';
        }, 300);
      }
    }

    // Alterna mensagens a cada 3 segundos
    const messageInterval = setInterval(changeLoadingMessage, 3000);

    // Adiciona efeito de clique na logo
    const logo = document.querySelector('.logo');
    if (logo) {
      logo.addEventListener('click', function() {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = 'scale(1)';
        }, 150);
      });
    }

    // Função para esconder a tela de carregamento
    function hideLoadingScreen() {
      clearInterval(messageInterval);
      loadingScreen.classList.add('hide');
      flutterApp.style.display = 'block';
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 500);
    }

    // Esconde a tela quando o Flutter estiver carregado
    window.addEventListener('flutter-first-frame', hideLoadingScreen);

    // Fallback: esconde após 8 segundos se Flutter não sinalizar
    setTimeout(() => {
      if (!loadingScreen.classList.contains('hide')) {
        hideLoadingScreen();
      }
    }, 8000);

    // Detecta quando o Flutter terminou de carregar
    document.addEventListener('DOMContentLoaded', function() {
      // Verifica se o Flutter já carregou
      if (window.flutterConfiguration || document.querySelector('flutter-view')) {
        setTimeout(hideLoadingScreen, 2000);
      }
    });
  </script>
  
  <script>
    // Verifica se já processamos a limpeza nesta sessão
    if (!sessionStorage.getItem('swCleaned')) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          const hadRegistrations = registrations.length > 0;
          
          for (const registration of registrations) {
            registration.unregister();
          }
          
          if (hadRegistrations) {
            console.log('Service Workers removidos. Recarregando...');
            sessionStorage.setItem('swCleaned', 'true');
            window.location.reload();
          }
        });
      }
    }
  </script>
</body> 
</html>
