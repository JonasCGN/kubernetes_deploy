apiVersion: v1
kind: Service
metadata:
  name: grafana-bridge
  namespace: braza-burger
spec:
  type: ExternalName
  externalName: kube-prometheus-stack-grafana.monitoring.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-bridge
  namespace: braza-burger
spec:
  type: ExternalName
  externalName: kube-prometheus-stack-prometheus.monitoring.svc.cluster.local
  ports:
    - name: http
      port: 9090
      targetPort: 9090
