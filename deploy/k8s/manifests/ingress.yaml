apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: braza-burger-ingress
  namespace: braza-burger
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: app.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-cliente
                port:
                  number: 80
    - host: api.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-manager
                port:
                  number: 5000
    - host: evolution.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: evolution-api
                port:
                  number: 8080
    - host: grafana.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-bridge
                port:
                  number: 80
    - host: prometheus.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-bridge
                port:
                  number: 9090
