name: Deploy VPS Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: GitHub Environment to use for secrets
        required: false
        default: KUBERNETES_DEPLOY
      force_rebuild:
        description: Force rebuilding images even if no relevant changes are detected
        required: false
        type: boolean
        default: false
      ref:
        description: Git ref to deploy (branch/tag/sha)
        required: false
        default: master
      kube_context:
        description: Optional kube context on VPS (empty = current-context)
        required: false
        default: ""
      deploy_monitoring:
        description: Install/upgrade monitoring stack
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment_name || 'KUBERNETES_DEPLOY' }}
    env:
      API_IMAGE_REPO: api-manager
      APP_IMAGE_REPO: app-cliente
      EVOLUTION_IMAGE: evoapicloud/evolution-api:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Print workflow revision
        shell: bash
        run: |
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Workflow ref: ${GITHUB_REF}"
          echo "Workflow ref name: ${GITHUB_REF_NAME}"

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TAG="${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "API_IMAGE=ghcr.io/${OWNER_LC}/${REPO_NAME}-${API_IMAGE_REPO}:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "APP_IMAGE=ghcr.io/${OWNER_LC}/${REPO_NAME}-${APP_IMAGE_REPO}:${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "API_IMAGE_LATEST=ghcr.io/${OWNER_LC}/${REPO_NAME}-${API_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "APP_IMAGE_LATEST=ghcr.io/${OWNER_LC}/${REPO_NAME}-${APP_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api_manager/**'
            app:
              - 'app_cliente/**'

      - name: Resolve deploy image tags
        id: deploy_tags
        shell: bash
        run: |
          set -euo pipefail

          FORCE_REBUILD_INPUT="${{ github.event.inputs.force_rebuild || 'false' }}"
          API_CHANGED="${{ steps.changes.outputs.api }}"
          APP_CHANGED="${{ steps.changes.outputs.app }}"

          if [ "$FORCE_REBUILD_INPUT" = "true" ]; then
            API_CHANGED="true"
            APP_CHANGED="true"
          fi

          if [ "$API_CHANGED" = "true" ]; then
            echo "API_SHOULD_BUILD=true" >> "$GITHUB_OUTPUT"
            echo "API_DEPLOY_IMAGE=${{ steps.vars.outputs.API_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "API_SHOULD_BUILD=false" >> "$GITHUB_OUTPUT"
            echo "API_DEPLOY_IMAGE=${{ steps.vars.outputs.API_IMAGE_LATEST }}" >> "$GITHUB_OUTPUT"
          fi

          if [ "$APP_CHANGED" = "true" ]; then
            echo "APP_SHOULD_BUILD=true" >> "$GITHUB_OUTPUT"
            echo "APP_DEPLOY_IMAGE=${{ steps.vars.outputs.APP_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "APP_SHOULD_BUILD=false" >> "$GITHUB_OUTPUT"
            echo "APP_DEPLOY_IMAGE=${{ steps.vars.outputs.APP_IMAGE_LATEST }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push api_manager image
        if: steps.deploy_tags.outputs.API_SHOULD_BUILD == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./api_manager
          file: ./api_manager/Dockerfile.prod
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.vars.outputs.API_IMAGE }}
            ${{ steps.vars.outputs.API_IMAGE_LATEST }}

      - name: Build and push app_cliente image
        if: steps.deploy_tags.outputs.APP_SHOULD_BUILD == 'true'
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
        uses: docker/build-push-action@v6
        with:
          context: ./app_cliente
          file: ./app_cliente/Dockerfile.prod
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_API_URL=${{ secrets.APP_API_URL }}
          tags: |
            ${{ steps.vars.outputs.APP_IMAGE }}
            ${{ steps.vars.outputs.APP_IMAGE_LATEST }}

      - name: Validate built frontend API endpoint
        if: steps.deploy_tags.outputs.APP_SHOULD_BUILD == 'true'
        shell: bash
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
        run: |
          set -euo pipefail

          if [ -z "${APP_API_URL:-}" ]; then
            echo "APP_API_URL is empty in GitHub Environment secrets"
            exit 1
          fi

          case "$APP_API_URL" in
            *localhost*|*127.0.0.1*|*":5000"*)
              echo "APP_API_URL points to a local/dev endpoint: $APP_API_URL"
              echo "Set APP_API_URL to the public API domain (https://apibraza.<ip>.nip.io)"
              exit 1
              ;;
          esac

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          K8S_API_MANAGER_ENV: ${{ secrets.K8S_API_MANAGER_ENV }}
          K8S_EVOLUTION_ENV: ${{ secrets.K8S_EVOLUTION_ENV }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          EVOLUTION_DOMAIN: ${{ secrets.EVOLUTION_DOMAIN }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
          PROMETHEUS_DOMAIN: ${{ secrets.PROMETHEUS_DOMAIN }}
          HEADLAMP_DOMAIN: ${{ secrets.HEADLAMP_DOMAIN }}
          CERT_MANAGER_CLUSTER_ISSUER: ${{ secrets.CERT_MANAGER_CLUSTER_ISSUER || 'letsencrypt-prod' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: K8S_API_MANAGER_ENV,K8S_EVOLUTION_ENV,LETSENCRYPT_EMAIL,APP_DOMAIN,API_DOMAIN,EVOLUTION_DOMAIN,GRAFANA_DOMAIN,PROMETHEUS_DOMAIN,HEADLAMP_DOMAIN,CERT_MANAGER_CLUSTER_ISSUER
          command_timeout: 45m
          script: |
            cat >/tmp/remote-deploy.sh <<'EOF_REMOTE_DEPLOY'
            #!/usr/bin/env bash
            set -euo pipefail
            trap 'rc=$?; echo "Remote deploy failed at line $LINENO: $BASH_COMMAND (exit $rc)"; exit $rc' ERR

            echo "[remote] Starting deploy script"

            : "${PROJECT_DIR:?Missing PROJECT_DIR}"
            : "${BRANCH_NAME:?Missing BRANCH_NAME}"
            : "${GITHUB_REPOSITORY:?Missing GITHUB_REPOSITORY}"
            : "${API_DEPLOY_IMAGE:?Missing API_DEPLOY_IMAGE}"
            : "${APP_DEPLOY_IMAGE:?Missing APP_DEPLOY_IMAGE}"
            : "${EVOLUTION_DEPLOY_IMAGE:?Missing EVOLUTION_DEPLOY_IMAGE}"
            AUTO_INSTALL_CERT_MANAGER=true

            command -v git >/dev/null
            command -v kubectl >/dev/null
            command -v make >/dev/null
            command -v sed >/dev/null

            HELM_PRESENT=true
            command -v helm >/dev/null 2>&1 || HELM_PRESENT=false
            case "$HELM_PRESENT" in
              true)
                echo "[remote] Helm already installed"
                ;;
              *)
                echo "[remote] Helm not found, installing automatically"
                CURL_PRESENT=true
                command -v curl >/dev/null 2>&1 || CURL_PRESENT=false
                case "$CURL_PRESENT" in
                  true) ;;
                  *)
                    apt-get update
                    apt-get install -y curl
                    ;;
                esac

                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                command -v helm >/dev/null 2>&1 || { echo "[remote] Helm installation failed"; exit 1; }
                ;;
            esac

            echo "[remote] Validating required secrets"

            : "${K8S_API_MANAGER_ENV:?Missing GitHub Secret: K8S_API_MANAGER_ENV}"
            : "${K8S_EVOLUTION_ENV:?Missing GitHub Secret: K8S_EVOLUTION_ENV}"
            : "${LETSENCRYPT_EMAIL:?Missing GitHub Secret: LETSENCRYPT_EMAIL}"

            for required_domain in APP_DOMAIN API_DOMAIN EVOLUTION_DOMAIN; do
              : "${!required_domain:?Missing GitHub Secret: $required_domain}"
            done

            if [ "${DEPLOY_MONITORING:-false}" = "true" ]; then
              for required_domain in GRAFANA_DOMAIN PROMETHEUS_DOMAIN HEADLAMP_DOMAIN; do
                : "${!required_domain:?Missing GitHub Secret: $required_domain}"
              done
            fi

            retry_cmd() {
              local max_attempts="$1"
              shift
              local attempt=1
              local delay=8

              until "$@"; do
                local rc=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "[remote] Command failed after ${attempt} attempts: $*"
                  return "$rc"
                fi

                echo "[remote] Attempt ${attempt}/${max_attempts} failed (exit ${rc}). Retrying in ${delay}s..."
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }

            REPO_URL="${GH_REPO_TOKEN_VALUE:+https://x-access-token:${GH_REPO_TOKEN_VALUE}@github.com/${GITHUB_REPOSITORY}.git}"
            REPO_URL="${REPO_URL:-https://github.com/${GITHUB_REPOSITORY}.git}"
            export GIT_TERMINAL_PROMPT=0

            echo "[remote] Cloning repository into $PROJECT_DIR"
            rm -rf "$PROJECT_DIR"
            if command -v timeout >/dev/null 2>&1; then
              timeout 30 git ls-remote --heads "$REPO_URL" "$BRANCH_NAME" >/dev/null
              timeout 180 git clone --branch "$BRANCH_NAME" "$REPO_URL" "$PROJECT_DIR"
            else
              git ls-remote --heads "$REPO_URL" "$BRANCH_NAME" >/dev/null
              git clone --branch "$BRANCH_NAME" "$REPO_URL" "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            git fetch origin
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            KCTX="${KCTX_INPUT:-}"
            case "$KCTX" in
              "") KCTX="$(kubectl config current-context 2>/dev/null || true)" ;;
            esac
            : "${KCTX:?Unable to resolve kubectl context. Set kube_context input or configure current-context on VPS}"

            echo "[remote] Using kubectl context: $KCTX"

            KUBECONFIG_PATH="/tmp/remote-kubeconfig"
            kubectl config view --raw > "$KUBECONFIG_PATH"
            export KUBECONFIG="$KUBECONFIG_PATH"

            CERT_MANAGER_CRD="$(kubectl --context "$KCTX" get crd clusterissuers.cert-manager.io --ignore-not-found -o name 2>/dev/null || true)"
            CERT_MANAGER_DEPLOY="$(kubectl --context "$KCTX" -n cert-manager get deploy cert-manager --ignore-not-found -o name 2>/dev/null || true)"
            case "${CERT_MANAGER_CRD}${CERT_MANAGER_DEPLOY}" in
              "")
                echo "[remote] cert-manager not detected"
                case "$AUTO_INSTALL_CERT_MANAGER" in
                  true)
                    echo "[remote] Installing cert-manager via Helm"
                    kubectl --context "$KCTX" create namespace cert-manager --dry-run=client -o yaml | kubectl --context "$KCTX" apply -f -
                    helm repo add jetstack https://charts.jetstack.io --force-update
                    helm repo update
                    helm upgrade --install cert-manager jetstack/cert-manager \
                      --kube-context "$KCTX" \
                      -n cert-manager \
                      --set crds.enabled=true \
                      --wait --timeout 15m

                    kubectl --context "$KCTX" wait --for=condition=Established crd/clusterissuers.cert-manager.io --timeout=180s || true

                    CERT_MANAGER_CRD="$(kubectl --context "$KCTX" get crd clusterissuers.cert-manager.io --ignore-not-found -o name 2>/dev/null || true)"
                    case "$CERT_MANAGER_CRD" in
                      "")
                        echo "[remote] cert-manager installed but CRD clusterissuers.cert-manager.io was not found"
                        exit 1
                        ;;
                    esac
                    ;;
                  *)
                    echo "[remote] Skipping cert-manager install"
                    ;;
                esac
                ;;
            esac

            echo "[remote] Rendering ingress domains and issuer"
            sed -i "s|cert-manager.io/cluster-issuer: letsencrypt-prod|cert-manager.io/cluster-issuer: ${CERT_MANAGER_CLUSTER_ISSUER}|g" deploy/k8s/manifests/ingress.yaml
            sed -i "s|__APP_DOMAIN__|${APP_DOMAIN}|g; s|__API_DOMAIN__|${API_DOMAIN}|g; s|__EVOLUTION_DOMAIN__|${EVOLUTION_DOMAIN}|g" deploy/k8s/manifests/ingress.yaml
            sed -i "s|__LETSENCRYPT_EMAIL__|${LETSENCRYPT_EMAIL}|g" deploy/k8s/manifests/clusterissuer.yaml

            if [ "${DEPLOY_MONITORING:-false}" = "true" ]; then
              sed -i "s|cert-manager.io/cluster-issuer: letsencrypt-prod|cert-manager.io/cluster-issuer: ${CERT_MANAGER_CLUSTER_ISSUER}|g" deploy/k8s/manifests/ingress-monitoring.yaml
              sed -i "s|__GRAFANA_DOMAIN__|${GRAFANA_DOMAIN}|g; s|__PROMETHEUS_DOMAIN__|${PROMETHEUS_DOMAIN}|g" deploy/k8s/manifests/ingress-monitoring.yaml
              if [ -n "${HEADLAMP_DOMAIN:-}" ]; then
                sed -i "s|__HEADLAMP_DOMAIN__|${HEADLAMP_DOMAIN}|g; s|__CERT_MANAGER_CLUSTER_ISSUER__|${CERT_MANAGER_CLUSTER_ISSUER}|g; s|__HEADLAMP_IN_CLUSTER_CONTEXT__|${KCTX}|g" deploy/k8s/monitoring/headlamp-values.yaml
              else
                echo "[remote] HEADLAMP_DOMAIN not set; skipping Headlamp install"
              fi
            fi

            PLACEHOLDER_COUNT="$(awk '/__[A-Z_][A-Z_]*__/ {c++} END {print c+0}' deploy/k8s/manifests/ingress.yaml)"
            case "$PLACEHOLDER_COUNT" in
              0) : ;;
              *)
                echo "Unresolved ingress placeholders detected"
                exit 1
                ;;
            esac

            if [ "${DEPLOY_MONITORING:-false}" = "true" ]; then
              MONITORING_PLACEHOLDER_COUNT="$(awk '/__[A-Z_][A-Z_]*__/ {c++} END {print c+0}' deploy/k8s/manifests/ingress-monitoring.yaml)"
              case "$MONITORING_PLACEHOLDER_COUNT" in
                0) : ;;
                *)
                  echo "Unresolved monitoring ingress placeholders detected"
                  exit 1
                  ;;
              esac

              if [ -n "${HEADLAMP_DOMAIN:-}" ]; then
                HEADLAMP_PLACEHOLDER_COUNT="$(awk '/__[A-Z_][A-Z_]*__/ {c++} END {print c+0}' deploy/k8s/monitoring/headlamp-values.yaml)"
                case "$HEADLAMP_PLACEHOLDER_COUNT" in
                  0) : ;;
                  *)
                    echo "Unresolved headlamp placeholders detected"
                    exit 1
                    ;;
                esac
              fi
            fi

            ISSUER_PLACEHOLDER_COUNT="$(awk '/__[A-Z_][A-Z_]*__/ {c++} END {print c+0}' deploy/k8s/manifests/clusterissuer.yaml)"
            case "$ISSUER_PLACEHOLDER_COUNT" in
              0) : ;;
              *)
                echo "Unresolved clusterissuer placeholders detected"
                exit 1
                ;;
            esac

            echo "[remote] Applying namespace and secrets"
            kubectl --context "$KCTX" apply -f deploy/k8s/manifests/namespace.yaml
            printf '%s\n' "$K8S_API_MANAGER_ENV" | kubectl --context "$KCTX" -n braza-burger create secret generic api-manager-env --from-env-file=/dev/stdin --dry-run=client -o yaml | kubectl --context "$KCTX" apply -f -
            printf '%s\n' "$K8S_EVOLUTION_ENV" | kubectl --context "$KCTX" -n braza-burger create secret generic evolution-env --from-env-file=/dev/stdin --dry-run=client -o yaml | kubectl --context "$KCTX" apply -f -

            CERT_MANAGER_CRD="$(kubectl --context "$KCTX" get crd clusterissuers.cert-manager.io --ignore-not-found -o name 2>/dev/null || true)"
            case "$CERT_MANAGER_CRD" in
              "")
                echo "[remote] cert-manager not detected. Skipping ClusterIssuer apply."
                ;;
              *)
                echo "[remote] Applying ClusterIssuer manifests"
                kubectl --context "$KCTX" apply -f deploy/k8s/manifests/clusterissuer.yaml
                ;;
            esac

            echo "[remote] Applying workloads"
            retry_cmd 3 make k8s-apply-vps \
              KUBE_CONTEXT="$KCTX" \
              VPS_API_IMAGE="$API_DEPLOY_IMAGE" \
              VPS_APP_IMAGE="$APP_DEPLOY_IMAGE" \
              VPS_EVOLUTION_IMAGE="$EVOLUTION_DEPLOY_IMAGE"

            case "${DEPLOY_MONITORING:-false}" in
              true)
                echo "[remote] Deploying monitoring stack"
                make k8s-monitor-vps KUBE_CONTEXT="$KCTX"

                if [ -n "${HEADLAMP_DOMAIN:-}" ]; then
                  echo "[remote] Installing/Upgrading Headlamp"
                  helm repo add headlamp-k8s https://kubernetes-sigs.github.io/headlamp/ --force-update
                  helm repo update headlamp-k8s
                  if ! helm upgrade --install headlamp headlamp-k8s/headlamp \
                    --kube-context "$KCTX" \
                    -n monitoring \
                    -f deploy/k8s/monitoring/headlamp-values.yaml \
                    --wait=false --timeout 2m; then
                    echo "[remote] Headlamp Helm command failed. Collecting diagnostics..."
                    kubectl --context "$KCTX" -n monitoring get pods -l app.kubernetes.io/instance=headlamp -o wide || true
                    kubectl --context "$KCTX" -n monitoring describe pods -l app.kubernetes.io/instance=headlamp || true
                    kubectl --context "$KCTX" -n monitoring get ingress || true
                    kubectl --context "$KCTX" -n monitoring get events --sort-by=.metadata.creationTimestamp | tail -n 120 || true
                    exit 1
                  fi

                  echo "[remote] Waiting for Headlamp deployment object to appear"
                  HEADLAMP_DEPLOY_READY=false
                  for _ in $(seq 1 24); do
                    if kubectl --context "$KCTX" -n monitoring get deploy headlamp >/dev/null 2>&1; then
                      HEADLAMP_DEPLOY_READY=true
                      break
                    fi
                    sleep 5
                  done

                  if [ "$HEADLAMP_DEPLOY_READY" != "true" ]; then
                    echo "[remote] Headlamp deployment resource was not created in time. Collecting diagnostics..."
                    kubectl --context "$KCTX" -n monitoring get all -l app.kubernetes.io/instance=headlamp || true
                    kubectl --context "$KCTX" -n monitoring get ingress || true
                    kubectl --context "$KCTX" -n monitoring get events --sort-by=.metadata.creationTimestamp | tail -n 120 || true
                    exit 1
                  fi

                  if ! kubectl --context "$KCTX" -n monitoring rollout status deploy/headlamp --timeout=180s; then
                    echo "[remote] Headlamp deployment did not become Available in 180s. Collecting diagnostics..."
                    kubectl --context "$KCTX" -n monitoring get pods -l app.kubernetes.io/instance=headlamp -o wide || true
                    kubectl --context "$KCTX" -n monitoring describe deploy/headlamp || true
                    kubectl --context "$KCTX" -n monitoring describe pods -l app.kubernetes.io/instance=headlamp || true
                    kubectl --context "$KCTX" -n monitoring get ingress || true
                    kubectl --context "$KCTX" -n monitoring get events --sort-by=.metadata.creationTimestamp | tail -n 120 || true
                    exit 1
                  fi
                else
                  echo "[remote] HEADLAMP_DOMAIN not set; skipping Headlamp install"
                fi

                kubectl --context "$KCTX" apply -f deploy/k8s/manifests/ingress-monitoring.yaml
                ;;
              *)
                kubectl --context "$KCTX" -n braza-burger delete ingress braza-burger-monitoring-ingress --ignore-not-found
                ;;
            esac

            echo "[remote] Collecting status"
            make k8s-status-vps KUBE_CONTEXT="$KCTX"
            kubectl --context "$KCTX" get pods -A
            kubectl --context "$KCTX" -n braza-burger get ingress
            echo "[remote] Deploy finished successfully"
            EOF_REMOTE_DEPLOY

            chmod 700 /tmp/remote-deploy.sh

            PROJECT_DIR="${{ secrets.VPS_PROJECT_DIR || '$HOME/braza_burger' }}" \
            BRANCH_NAME="${{ github.event.inputs.ref || github.ref_name }}" \
            KCTX_INPUT="${{ github.event.inputs.kube_context || '' }}" \
            DEPLOY_MONITORING="${{ github.event.inputs.deploy_monitoring || 'false' }}" \
            GH_REPO_TOKEN_VALUE="${{ secrets.GH_REPO_TOKEN || '' }}" \
            GITHUB_REPOSITORY="${{ github.repository }}" \
            API_DEPLOY_IMAGE="${{ steps.deploy_tags.outputs.API_DEPLOY_IMAGE }}" \
            APP_DEPLOY_IMAGE="${{ steps.deploy_tags.outputs.APP_DEPLOY_IMAGE }}" \
            EVOLUTION_DEPLOY_IMAGE="${{ env.EVOLUTION_IMAGE }}" \
            /tmp/remote-deploy.sh
