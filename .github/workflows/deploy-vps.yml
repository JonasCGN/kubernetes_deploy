name: Deploy VPS Kubernetes

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch/tag/sha)
        required: false
        default: main
      kube_context:
        description: Optional kube context on VPS (empty = current-context)
        required: false
        default: ""
      deploy_monitoring:
        description: Install/upgrade monitoring stack
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      API_IMAGE_REPO: api-manager
      APP_IMAGE_REPO: app-cliente
      EVOLUTION_IMAGE: evoapicloud/evolution-api:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "API_IMAGE=docker.io/${IMAGE_NAMESPACE}/${API_IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "APP_IMAGE=docker.io/${IMAGE_NAMESPACE}/${APP_IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "API_IMAGE_LATEST=docker.io/${IMAGE_NAMESPACE}/${API_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "APP_IMAGE_LATEST=docker.io/${IMAGE_NAMESPACE}/${APP_IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push api_manager image
        uses: docker/build-push-action@v6
        with:
          context: ./api_manager
          file: ./api_manager/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.vars.outputs.API_IMAGE }}
            ${{ steps.vars.outputs.API_IMAGE_LATEST }}

      - name: Build and push app_cliente image
        uses: docker/build-push-action@v6
        with:
          context: ./app_cliente
          file: ./app_cliente/Dockerfile.prod
          push: true
          build-args: |
            API_URL=${{ secrets.APP_API_URL }}
          tags: |
            ${{ steps.vars.outputs.APP_IMAGE }}
            ${{ steps.vars.outputs.APP_IMAGE_LATEST }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ secrets.VPS_PROJECT_DIR || '~/braza_burger' }}"
            BRANCH_NAME="${{ github.ref_name }}"
            KCTX_INPUT="${{ github.event.inputs.kube_context || '' }}"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              if [ -n "${{ secrets.GH_REPO_TOKEN || '' }}" ]; then
                git clone "https://x-access-token:${{ secrets.GH_REPO_TOKEN }}@github.com/${{ github.repository }}.git" "$PROJECT_DIR"
              else
                git clone "https://github.com/${{ github.repository }}.git" "$PROJECT_DIR"
              fi
            fi

            cd "$PROJECT_DIR"

            git fetch origin
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            if [ -n "$KCTX_INPUT" ]; then
              KCTX="$KCTX_INPUT"
            else
              KCTX="$(kubectl config current-context)"
            fi

            if [ "${{ github.event.inputs.deploy_monitoring || 'true' }}" = "true" ]; then
              make k8s-deploy-vps-full \
                KUBE_CONTEXT="$KCTX" \
                VPS_API_IMAGE="${{ steps.vars.outputs.API_IMAGE }}" \
                VPS_APP_IMAGE="${{ steps.vars.outputs.APP_IMAGE }}" \
                VPS_EVOLUTION_IMAGE="${{ env.EVOLUTION_IMAGE }}"
            else
              make k8s-deploy-vps \
                KUBE_CONTEXT="$KCTX" \
                VPS_API_IMAGE="${{ steps.vars.outputs.API_IMAGE }}" \
                VPS_APP_IMAGE="${{ steps.vars.outputs.APP_IMAGE }}" \
                VPS_EVOLUTION_IMAGE="${{ env.EVOLUTION_IMAGE }}"
            fi

            kubectl --context "$KCTX" get pods -A
            kubectl --context "$KCTX" -n braza-burger get ingress
